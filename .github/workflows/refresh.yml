name: Refresh feeds

on:
  schedule:
    # 4 прогона в сутки, каждые 6 часов, заканчиваются за 30 мин до n8n cron MAIN (00:00/06:00/12:00/18:00 MSK)
    - cron: "30 20 * * *"  # 20:30 UTC = 23:30 MSK → готовит фид к MAIN 00:00 MSK
    - cron: "30 2 * * *"   # 02:30 UTC = 05:30 MSK → готовит фид к MAIN 06:00 MSK
    - cron: "30 8 * * *"   # 08:30 UTC = 11:30 MSK → готовит фид к MAIN 12:00 MSK
    - cron: "30 14 * * *"  # 14:30 UTC = 17:30 MSK → готовит фид к MAIN 18:00 MSK
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-feeds
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run crawler
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: python build_feeds.py

      - name: Commit updated feeds
        run: |
          git config user.name "ai-news-spider-bot"
          git config user.email "actions@github.com"
          git add feeds/
          if git diff --staged --quiet; then
            echo "no feed changes"
            exit 0
          fi
          git commit -m "refresh feeds $(date -u +'%Y-%m-%dT%H:%MZ')"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main || true
            if git push; then
              echo "push ok on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed, sleeping 5s"
            sleep 5
          done
          echo "push failed after 5 attempts"
          exit 1
