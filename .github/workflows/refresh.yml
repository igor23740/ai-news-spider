name: Refresh feeds

on:
  schedule:
    - cron: "17 */3 * * *"   # каждые 3 часа на :17
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-feeds
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run crawler
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: python build_feeds.py

      - name: Commit updated feeds
        run: |
          git config user.name "ai-news-spider-bot"
          git config user.email "actions@github.com"
          git add feeds/
          if git diff --staged --quiet; then
            echo "no feed changes"
          else
            git commit -m "refresh feeds $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
