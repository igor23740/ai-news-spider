# HTML-источники AI-лабораторий, для которых нет RSS.
# Крулер парсит index-страницу, достаёт ссылки на статьи по link_pattern,
# тянет каждую статью, извлекает заголовок/дату/описание, собирает RSS 2.0.
#
# link_pattern — regex, которому должен соответствовать HREF артикула
# stealth — true для сайтов с анти-бот защитой (Patchright)
# wait_until — networkidle | domcontentloaded (для SPA)
# wait_selector — CSS-селектор, дождаться его появления (для SPA)

lookback_days: 14          # сколько дней истории держать в фиде
max_items_per_feed: 30     # верхний предел записей в каждом xml
article_concurrency: 6     # параллельных загрузок статей на источник

sources:
  # Anthropic убран из паука 2026-05-12 — у них есть официальный RSS
  # https://www.anthropic.com/rss.xml, подключён напрямую в qvabo rss_feeds id=57.
  # Если файл feeds/anthropic.xml остался — старая копия, парсер qvabo её больше не читает.

  - slug: xai
    name: xAI News
    site: https://x.ai
    index_url: https://x.ai/news
    link_pattern: '/news/[a-z0-9-]+$'

  - slug: elevenlabs
    name: ElevenLabs Blog
    site: https://elevenlabs.io
    index_url: https://elevenlabs.io/blog
    link_pattern: '/blog/[a-z0-9-]+$'

  - slug: cursor
    name: Cursor Blog
    site: https://cursor.com
    index_url: https://cursor.com/blog
    link_pattern: '/blog/[a-z0-9-]+$'

  - slug: perplexity
    name: Perplexity Hub
    site: https://www.perplexity.ai
    index_url: https://www.perplexity.ai/hub/blog
    link_pattern: '/hub/blog/[a-z0-9-]+$'

  - slug: suno
    name: Suno Blog
    site: https://suno.com
    index_url: https://suno.com/blog
    link_pattern: '/blog/[a-z0-9-]+$'
    wait_until: networkidle
    wait_selector: 'a[href^="/blog/"]'

  - slug: runway
